<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NITROV - Active Session</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { margin:0; overflow:hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display:block; width:100vw; height:100vh; position: relative; z-index: 5; }
        #ui { position:fixed; top:30px; left:50%; transform:translateX(-50%); width: 90%; display: flex; justify-content: space-between; font-size: 20px; color: #fff; text-shadow: 0 0 10px #0ff; z-index: 10; pointer-events: none; }
        #judgment { position:fixed; top:45%; left:50%; transform:translate(-50%, -50%); font-size: 60px; font-weight: 900; z-index: 15; pointer-events: none; opacity: 0; transition: 0.1s; text-transform: uppercase; }
        #countdown { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); font-size:150px; color:#f0f; text-shadow: 0 0 40px #f0f; z-index: 100; display: none; }
        #results { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%) scale(0); background:rgba(0,0,0,0.98); padding:60px; border:4px solid #f0f; border-radius:30px; color:#fff; text-align:center; transition:0.5s; z-index: 110; width: 450px; }
        .res-rank { font-size: 120px; text-shadow: 0 0 30px #0ff; margin-bottom: 10px; }
        button { background: transparent; color: #0ff; border: 2px solid #0ff; padding: 15px 40px; font-size: 18px; cursor: pointer; font-family: 'Orbitron'; margin-top: 20px; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div>ACC: <span id="acc">100</span>%</div>
    <div style="font-size: 32px;">TIME: <span id="time">30</span></div>
    <div>COMBO: <span id="combo">0</span></div>
</div>
<div id="judgment">PERFECT</div>
<div id="countdown">3</div>
<div id="results">
    <div id="rank-val" class="res-rank">SS</div>
    <div id="stats-val" style="font-size: 18px; line-height: 1.8;"></div>
    <button onclick="window.location.href='index.html'">RETRY / MENU</button>
   <button onclick="location.reload()">Restart</button>

</div>

<script>
    const DIFF_MAP = { easy:800, medium:500, hard:350, impossible:250, demon:160 };
    const selLvl = localStorage.getItem("neonDifficulty") || "medium";
    const adv = JSON.parse(localStorage.getItem("neonAdv")) || { speed:15, bgm:50, sfx:80, dim:40 };
    const keyData = JSON.parse(localStorage.getItem("neonKeys")) || ["Z","X","N","M"];
    const inputMap = {}; keyData.forEach((k,i) => inputMap[k.toLowerCase()] = i);

    const hitSfx = new Audio("https://www.fesliyanstudios.com");
    const tracks = ["https://www.soundhelix.com", "https://www.soundhelix.com"];
    let bgm = null, canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
    
    let lanes = [], laneWidth = 130, hitY, score=0, combo=0, perfect=0, miss=0, running=false, notes=[], particles=[];
    let hitLights = [0,0,0,0], shakeAmt = 0, timeLeft = 30;

    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const totalW = (laneWidth * 4) + 60;
        const startX = (canvas.width / 2) - (totalW / 2);
        lanes = [0,1,2,3].map(i => ({ x: startX + (i * (laneWidth + 20)), holding: false }));
        hitY = canvas.height - 180;
    }

    function triggerJudgment(txt, color) {
        const el = document.getElementById("judgment");
        el.innerText = txt; el.style.color = color; el.style.opacity = 1;
        el.style.transform = "translate(-50%, -50%) scale(1.3)";
        setTimeout(() => { el.style.opacity = 0; el.style.transform = "translate(-50%, -50%) scale(1)"; }, 250);
    }

    function createParticles(x, y, color) {
        for(let i=0; i<15; i++) particles.push({ x, y, color, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1.0, size: Math.random()*5+2 });
    }

    function init() {
        resize();
        bgm = new Audio(tracks[Math.floor(Math.random()*tracks.length)]);
        bgm.volume = adv.bgm/100;
        const cnt = document.getElementById("countdown"); cnt.style.display = "block";
        let t = 3; cnt.innerText = t;
        const timer = setInterval(() => {
            t--;
            if(t > 0) cnt.innerText = t;
            else if(t === 0) { cnt.innerText = "GO!"; bgm.play().catch(()=>{}); }
            else { clearInterval(timer); cnt.style.display = "none"; running = true; startLoops(); }
        }, 1000);
    }

    function startLoops() {
        setInterval(() => {
            if(!running) return;
            let l = Math.floor(Math.random()*4);
            const laneNotes = notes.filter(n => n.lane === l);
            if(laneNotes.length > 0 && laneNotes[laneNotes.length-1].y < 120) return;
            let hold = Math.random() < 0.2, len = hold ? (250 + Math.random()*600) : 75;
            notes.push({ lane: l, y: -len, hold, length: len, hit: false });
        }, DIFF_MAP[selLvl]);

        const clock = setInterval(() => {
            if(!running) { clearInterval(clock); return; }
            timeLeft--;
            document.getElementById("time").innerText = timeLeft;
            if(timeLeft <= 0) endSession();
        }, 1000);
    }

    window.addEventListener("keydown", e => {
        const i = inputMap[e.key.toLowerCase()];
        if(running && i !== undefined && !lanes[i].holding) {
            lanes[i].holding = true;
            if(!hit(i)) { score = Math.max(0, score - 150); combo = 0; triggerJudgment("MISS", "#f00"); updateUI(); }
        }
    });
    window.addEventListener("keyup", e => { const i = inputMap[e.key.toLowerCase()]; if(i !== undefined && lanes[i]) lanes[i].holding = false; });

    function hit(l) {
        const active = notes.filter(n => n.lane === l && !n.hit);
        for(let n of active) {
            if(Math.abs((n.y + n.length) - hitY) < 85) {
                n.hit = true; hitLights[l] = 1.0; shakeAmt = 10;
                const s = hitSfx.cloneNode(); s.volume = adv.sfx/100; s.play();
                createParticles(lanes[l].x + laneWidth/2, hitY, n.hold ? "#f0f" : "#0ff");
                if(!n.hold) { score += 300; perfect++; combo++; triggerJudgment("PERFECT", "#0ff"); notes = notes.filter(x => x !== n); }
                else triggerJudgment("HOLDING", "#f0f");
                updateUI(); return true;
            }
        }
        return false;
    }

    function updateUI() {
        let total = perfect + miss, acc = total ? (perfect/total*100).toFixed(1) : 100;
        document.getElementById("acc").innerText = acc; document.getElementById("combo").innerText = combo;
    }

    function render() {
        ctx.save();
        if(shakeAmt > 0) { ctx.translate((Math.random()-0.5)*shakeAmt, (Math.random()-0.5)*shakeAmt); shakeAmt *= 0.9; }
        ctx.fillStyle = `rgba(0,0,0,${adv.dim/100})`; ctx.fillRect(0,0,canvas.width,canvas.height);

        if(lanes.length > 0) {
            lanes.forEach((l, i) => {
                ctx.fillStyle = l.holding ? "rgba(255,0,255,0.15)" : "rgba(0,255,255,0.03)"; ctx.fillRect(l.x, 0, laneWidth, canvas.height);
                if(hitLights[i] > 0) {
                    let grad = ctx.createLinearGradient(0, hitY, 0, hitY - 300);
                    grad.addColorStop(0, `rgba(255, 0, 255, ${hitLights[i]})`); grad.addColorStop(1, "rgba(255, 0, 255, 0)");
                    ctx.fillStyle = grad; ctx.fillRect(l.x, hitY - 300, laneWidth, 300); hitLights[i] -= 0.04;
                }
            });
            ctx.strokeStyle = "#f0f"; ctx.lineWidth = 5; ctx.shadowBlur = 20; ctx.shadowColor = "#f0f";
            ctx.beginPath(); ctx.moveTo(lanes[0].x, hitY); ctx.lineTo(lanes[3].x + laneWidth, hitY); ctx.stroke(); ctx.shadowBlur = 0;
        }

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i,1); else { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); } });
        ctx.globalAlpha = 1.0;

        for(let i=notes.length-1; i>=0; i--) {
            let n = notes[i]; if(running) n.y += parseFloat(adv.speed);
            if(n.hold && n.hit && lanes[n.lane].holding && (n.y+n.length) >= hitY && n.y < hitY) { n.length = Math.max(0, hitY - n.y); score += 10; combo++; updateUI(); }
            if(n.y > canvas.height || (n.hold && n.length <= 0)) {
                if(running && !n.hit) { miss++; combo = 0; triggerJudgment("MISS", "#f00"); updateUI(); }
                else if(n.hold && n.length <= 0) { perfect++; combo++; updateUI(); }
                notes.splice(i, 1); continue;
            }
            ctx.fillStyle = n.hold ? "#f0f" : "#0ff"; ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(lanes[n.lane].x + 5, n.y, laneWidth - 10, n.length); ctx.shadowBlur = 0;
        }
        ctx.restore();
        requestAnimationFrame(render);
    }

    function endSession() {
        running = false; if(bgm) bgm.pause();
        document.getElementById("results").style.transform = "translate(-50%, -50%) scale(1)";
        let total = perfect+miss, acc = total ? (perfect/total*100).toFixed(1) : 100;
        document.getElementById("rank-val").innerText = acc >= 98 ? "SS" : acc >= 90 ? "S" : acc >= 80 ? "A" : "B";
        document.getElementById("stats-val").innerHTML = `ACCURACY: ${acc}%<br>PERFECT: ${perfect}<br>MISS: ${miss}<br>SCORE: ${score}`;
    }

    window.addEventListener("resize", resize);
    init(); render();
</script>
</body>
</html>
